<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Girls Band Cry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-pink: #ff2b6e;
            --neon-blue: #3b82f6;
            --glass-bg: rgba(15, 12, 30, 0.75);
            --text-light: #f0f0ff;
            --text-dim: #aaa9c9;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0b0b1f, #1a0f2e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .player-card {
            max-width: 550px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.4rem 1.6rem 0.5rem;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(130deg, #ff2b6e, #ff9fbc, #b847ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .glass-icon {
            background: rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-light);
            font-size: 1.3rem;
        }
        .glass-icon:hover { background: var(--neon-pink); transform: scale(0.96); }
        .disc-zone { display: flex; justify-content: center; margin: 15px 0 10px; }
        .vinyl {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2e1e44, #0c081a);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
            position: relative;
        }
        .cover-inner {
            width: 86%;
            height: 86%;
            border-radius: 50%;
            overflow: hidden;
            animation: rotateVinyl 22s linear infinite paused;
            background: #0a0515;
        }
        .cover-inner.playing { animation-play-state: running; }
        @keyframes rotateVinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cover-img { width: 100%; height: 100%; object-fit: cover; }
        .song-details { text-align: center; margin: 14px 0 8px; }
        .track-title {
            font-size: 1.65rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffc0da);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .track-artist { color: var(--text-dim); margin-top: 4px; font-size: 0.9rem; }
        .progress-area { padding: 0 24px; margin-top: 6px; }
        .progress-bar-bg {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
            border-radius: 10px;
        }
        .time-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: var(--text-dim); }
        .controls-row { display: flex; justify-content: center; gap: 28px; padding: 16px 0 8px; }
        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
        }
        .ctrl-btn:hover { color: var(--neon-pink); transform: scale(1.05); }
        .play-main {
            background: linear-gradient(145deg, var(--neon-pink), #a10e43);
            width: 68px;
            height: 68px;
            font-size: 2rem;
            box-shadow: 0 0 12px var(--neon-pink);
        }
        .mode-strip { display: flex; justify-content: center; gap: 20px; margin: 6px 0 5px; }
        .mode-chip {
            background: rgba(255,255,255,0.06);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.2s;
        }
        .mode-chip.active { background: rgba(255,43,110,0.3); color: var(--neon-pink); border: 0.5px solid var(--neon-pink); }
        .mixer { padding: 8px 24px; display: flex; align-items: center; gap: 12px; }
        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--neon-pink);
            border-radius: 50%;
            cursor: pointer;
        }
        .viz-bar { display: flex; gap: 3px; align-items: flex-end; height: 32px; }
        .viz { width: 4px; background: linear-gradient(to top, var(--neon-pink), #ffb0ca); border-radius: 2px; transition: height 0.05s; }
        .lyric-panel {
            background: rgba(0,0,0,0.35);
            margin: 12px 20px;
            border-radius: 28px;
            padding: 12px 16px;
            max-height: 100px;
            overflow-y: auto;
            text-align: center;
            font-size: 0.8rem;
        }
        .playlist-section { padding: 8px 20px 22px; }
        .playlist-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
        .playlist-scroll { max-height: 240px; overflow-y: auto; }
        .track-item {
            background: rgba(255,255,255,0.03);
            border-radius: 60px;
            padding: 7px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.15s;
            gap: 6px;
        }
        .track-item.active { background: rgba(255,43,110,0.2); border-left: 3px solid var(--neon-pink); }
        .track-info { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.85rem; }
        .track-duration { font-size: 0.7rem; margin: 0 6px; color: #c9baff; }
        .modal-global {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: #18132e;
            width: 90%;
            max-width: 440px;
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid var(--neon-pink);
        }
        .upload-area {
            border: 1.5px dashed var(--neon-pink);
            border-radius: 1.5rem;
            padding: 18px;
            text-align: center;
            margin: 12px 0;
            cursor: pointer;
        }
        .form-input {
            background: #2a2446;
            border: none;
            border-radius: 40px;
            padding: 8px 15px;
            width: 100%;
            color: white;
            margin: 8px 0;
        }
        .submit-glow {
            background: linear-gradient(95deg, var(--neon-pink), #b847ff);
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 16px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ff2b6edd;
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            z-index: 1100;
            display: none;
            color: white;
        }
        .file-chip { background: #2f284e; border-radius: 30px; padding: 4px 10px; margin: 4px; display: inline-block; font-size: 0.7rem; }
        button { background: none; border: none; color: white; cursor: pointer; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #2a2342; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 10px; }
    </style>
</head>
<body>
<div class="player-card">
    <div class="header">
        <span class="logo"><i class="fas fa-guitar"></i> Girls Band Cry</span>
        <div class="glass-icon" id="uploadTrigger"><i class="fas fa-plus-circle"></i></div>
    </div>
    <div class="disc-zone">
        <div class="vinyl">
            <div class="cover-inner" id="coverInner">
                <img class="cover-img" id="coverImg" src="https://i.ibb.co/7bG1vXx/gbc-album.jpg" alt="cover">
            </div>
        </div>
    </div>
    <div class="song-details">
        <div class="track-title" id="trackName">Girls Band Cry</div>
        <div class="track-artist" id="trackArtist">点击播放</div>
    </div>
    <div class="progress-area">
        <div class="progress-bar-bg" id="progressBg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="time-row"><span id="currentTime">0:00</span><span id="totalDuration">0:00</span></div>
    </div>
    <div class="controls-row">
        <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
        <button class="ctrl-btn play-main" id="playPauseBtn"><i class="fas fa-play" id="playPauseIcon"></i></button>
        <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
    </div>
    <div class="mode-strip">
        <div class="mode-chip" id="repeatModeBtn"><i class="fas fa-redo-alt"></i> 循环</div>
        <div class="mode-chip" id="shuffleModeBtn"><i class="fas fa-random"></i> 随机</div>
        <div class="mode-chip" id="speedBtn"><i class="fas fa-tachometer-alt"></i> 速度 <span id="speedVal">1.0x</span></div>
    </div>
    <div class="mixer">
        <i class="fas fa-volume-down"></i>
        <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="0.7" class="volume-slider">
        <i class="fas fa-volume-up"></i>
        <div class="viz-bar" id="vizContainer"></div>
    </div>
    <div class="lyric-panel" id="lyricBox">🎵 点击播放音乐</div>
    <div class="playlist-section">
        <div class="playlist-header"><span>🎵 播放列表</span><span id="songCount">0 首</span></div>
        <div class="playlist-scroll" id="playlistContainer"></div>
    </div>
</div>

<audio id="nativeAudio" style="display: none;"></audio>

<div class="modal-global" id="uploadModal">
    <div class="modal-card">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h3>📁 添加音乐</h3><button id="closeUploadModal" style="font-size:1.8rem;">&times;</button></div>
        <div class="upload-area" id="dropArea"><i class="fas fa-cloud-upload-alt fa-2x"></i><p>点击选择音乐文件</p><input type="file" id="fileInput" multiple accept="audio/*" style="display:none"></div>
        <div id="filePreviewList"></div>
        <button class="submit-glow" id="confirmUploadBtn">✨ 添加到列表</button>
    </div>
</div>
<div class="toast" id="toastMsg"></div>

<script>
    // ============================================================
    // 📌 在这里添加你的音乐：每首歌写一行，复制粘贴改路径就行
    // ============================================================
    const SONGS = [
        { name: "なんでもないや",   artist: "RADWIMPS", path: "./audio/RADWIMPS - なんでもないや.flac" },
        { name: "スパークル",       artist: "RADWIMPS", path: "./audio/RADWIMPS - スパークル.flac" },
        { name: "前前前世",         artist: "RADWIMPS", path: "./audio/RADWIMPS - 前前前世.flac" },
        { name: "夢灯籠",           artist: "RADWIMPS", path: "./audio/RADWIMPS - 夢灯籠.flac" },
        { name: "愛にできることはまだあるかい", artist: "RADWIMPS", path: "./audio/RADWIMPS - 愛にできることはまだあるかい.flac" },
        // 👇 添加新歌：复制下面一行，改名字、艺术家、文件路径
        // { name: "你的歌名", artist: "歌手名", path: "./audio/你的文件.mp3" },
    ];
    // ============================================================
    // 下面代码不用改，直接就能用
    // ============================================================
    
    let playlist = [];
    let currentIndex = 0;
    let isPlaying = false;
    let playMode = "normal";
    let shuffleIndices = [];
    let playbackRateVal = 1.0;
    
    const audio = document.getElementById('nativeAudio');
    const playBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playPauseIcon');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBg = document.getElementById('progressBg');
    const curTimeSpan = document.getElementById('currentTime');
    const totalDurSpan = document.getElementById('totalDuration');
    const volumeRange = document.getElementById('volumeRange');
    const coverImg = document.getElementById('coverImg');
    const coverInner = document.getElementById('coverInner');
    const trackNameSpan = document.getElementById('trackName');
    const trackArtistSpan = document.getElementById('trackArtist');
    const playlistContainer = document.getElementById('playlistContainer');
    const songCountSpan = document.getElementById('songCount');
    const lyricBox = document.getElementById('lyricBox');
    const repeatBtn = document.getElementById('repeatModeBtn');
    const shuffleBtn = document.getElementById('shuffleModeBtn');
    const speedValSpan = document.getElementById('speedVal');
    const vizContainer = document.getElementById('vizContainer');
    let vizBars = [];
    let animFrame = null;
    let audioCtx = null, analyser = null;
    
    function formatTime(sec) { if(isNaN(sec)) return '0:00'; let m = Math.floor(sec/60), s = Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }
    function showMsg(msg) { let t = document.getElementById('toastMsg'); t.textContent = msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
    
    // 初始化频谱
    function initViz() { vizContainer.innerHTML = ''; for(let i=0;i<32;i++){ let b=document.createElement('div'); b.className='viz'; b.style.height='3px'; vizContainer.appendChild(b); } vizBars = document.querySelectorAll('.viz'); }
    initViz();
    
    // 更新列表UI
    function updateList() {
        let html = '';
        playlist.forEach((s, i) => {
            let active = i === currentIndex ? 'active' : '';
            html += `<div class="track-item ${active}" data-idx="${i}"><div class="track-info"><i class="fas fa-music"></i> ${escapeHtml(s.name)}</div><div class="track-duration">${s.dur || '0:00'}</div></div>`;
        });
        playlistContainer.innerHTML = html || '<div style="text-align:center;color:#aaa;padding:15px;">✨ 点击➕添加音乐</div>';
        songCountSpan.innerText = `${playlist.length} 首`;
        document.querySelectorAll('.track-item').forEach(el => {
            el.addEventListener('click', () => { let idx = parseInt(el.dataset.idx); if(!isNaN(idx)) play(idx); });
        });
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return m=='&'?'&amp;':m=='<'?'&lt;':'&gt;';}); }
    
    // 播放指定歌曲
    function play(idx) {
        if(idx < 0 || idx >= playlist.length) return;
        currentIndex = idx;
        let s = playlist[currentIndex];
        trackNameSpan.innerText = s.name;
        trackArtistSpan.innerText = s.artist;
        coverImg.src = s.cover || 'https://i.ibb.co/7bG1vXx/gbc-album.jpg';
        audio.src = s.path;
        audio.load();
        audio.playbackRate = playbackRateVal;
        audio.addEventListener('loadedmetadata', function onLoad() {
            totalDurSpan.innerText = formatTime(audio.duration);
            audio.removeEventListener('loadedmetadata', onLoad);
        }, { once: true });
        if(isPlaying) audio.play().catch(()=>showMsg('文件不存在'));
        progressFill.style.width = '0%';
        curTimeSpan.innerText = '0:00';
        updateList();
        lyricBox.innerHTML = `🎵 ${s.name} - ${s.artist}`;
    }
    
    function playPause() {
        if(playlist.length === 0){ showMsg('请先点击➕添加音乐'); return; }
        if(isPlaying) { audio.pause(); isPlaying=false; playIcon.className='fas fa-play'; coverInner.classList.remove('playing'); if(animFrame)cancelAnimationFrame(animFrame); if(audioCtx)audioCtx.suspend(); }
        else { 
            if(!audio.src) play(0);
            audio.play().then(()=>{ isPlaying=true; playIcon.className='fas fa-pause'; coverInner.classList.add('playing'); startViz(); if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); }).catch(()=>showMsg('播放失败')); 
        }
    }
    
    function next() {
        if(playlist.length === 0) return;
        if(playMode === 'shuffle'){
            if(shuffleIndices.length===0) reshuffle();
            let pos = (shuffleIndices.indexOf(currentIndex)+1) % shuffleIndices.length;
            play(shuffleIndices[pos]);
        } else {
            play((currentIndex+1) % playlist.length);
        }
    }
    function prev() {
        if(playlist.length === 0) return;
        if(playMode === 'shuffle'){
            if(shuffleIndices.length===0) reshuffle();
            let pos = (shuffleIndices.indexOf(currentIndex)-1+shuffleIndices.length) % shuffleIndices.length;
            play(shuffleIndices[pos]);
        } else {
            play((currentIndex-1+playlist.length) % playlist.length);
        }
    }
    function reshuffle() { shuffleIndices = [...Array(playlist.length).keys()]; for(let i=shuffleIndices.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [shuffleIndices[i],shuffleIndices[j]]=[shuffleIndices[j],shuffleIndices[i]]; } }
    
    function startViz() {
        if(!audioCtx && audio.src){
            try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); analyser.fftSize=256; let src = audioCtx.createMediaElementSource(audio); src.connect(analyser); analyser.connect(audioCtx.destination); }catch(e){}
        }
        function draw(){
            if(!isPlaying){ if(animFrame)cancelAnimationFrame(animFrame); return; }
            if(analyser){
                let freq = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(freq);
                for(let i=0;i<vizBars.length;i++){ let h = Math.min(28, 3 + (freq[i*2]||0)/14); vizBars[i].style.height = `${h}px`; }
            } else { for(let i=0;i<vizBars.length;i++) vizBars[i].style.height = `${5+Math.random()*12}px`; }
            animFrame = requestAnimationFrame(draw);
        }
        if(animFrame) cancelAnimationFrame(animFrame);
        draw();
    }
    
    function updateProgress() {
        if(!audio.src || isNaN(audio.duration)) return;
        let p = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${p}%`;
        curTimeSpan.innerText = formatTime(audio.currentTime);
        if(totalDurSpan.innerText === '0:00' && audio.duration>0) totalDurSpan.innerText = formatTime(audio.duration);
    }
    
    // 从 SONGS 数组加载
    function loadSongs() {
        playlist = [];
        SONGS.forEach(s => { playlist.push({ name: s.name, artist: s.artist, path: s.path, dur: '0:00', cover: s.cover }); });
        updateList();
        if(playlist.length > 0) play(0);
        showMsg(`✅ 加载 ${playlist.length} 首音乐`);
    }
    
    // 上传文件
    let pendingFiles = [];
    const uploadModal = document.getElementById('uploadModal');
    document.getElementById('uploadTrigger').onclick = () => uploadModal.style.display = 'flex';
    document.getElementById('closeUploadModal').onclick = () => uploadModal.style.display = 'none';
    document.getElementById('dropArea').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => {
        pendingFiles = Array.from(e.target.files);
        document.getElementById('filePreviewList').innerHTML = pendingFiles.map(f => `<span class="file-chip">📁 ${f.name}</span>`).join('');
    };
    document.getElementById('confirmUploadBtn').onclick = async () => {
        if(pendingFiles.length === 0){ showMsg('请选择文件'); return; }
        for(let f of pendingFiles){
            let url = URL.createObjectURL(f);
            let name = f.name.replace(/\.[^/.]+$/, '');
            let temp = new Audio();
            temp.src = url;
            let dur = '0:00';
            await new Promise(resolve => {
                temp.addEventListener('loadedmetadata', () => { dur = formatTime(temp.duration); resolve(); }, { once: true });
                setTimeout(resolve, 300);
            });
            playlist.push({ name: name, artist: '本地音乐', path: url, dur: dur, cover: null });
        }
        updateList();
        if(playlist.length && !audio.src) play(0);
        uploadModal.style.display = 'none';
        pendingFiles = [];
        document.getElementById('filePreviewList').innerHTML = '';
        showMsg(`✅ 添加 ${pendingFiles.length} 首`);
    };
    window.onclick = (e) => { if(e.target.classList.contains('modal-global')) e.target.style.display = 'none'; };
    
    // 事件绑定
    playBtn.addEventListener('click', playPause);
    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    volumeRange.addEventListener('input', (e) => audio.volume = e.target.value);
    progressBg.addEventListener('click', (e) => { if(audio.duration){ let r = progressBg.getBoundingClientRect(); let p = (e.clientX - r.left) / r.width; audio.currentTime = p * audio.duration; } });
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => { if(playMode==='repeat'){ audio.currentTime=0; audio.play(); } else next(); });
    repeatBtn.addEventListener('click', () => { playMode = playMode==='repeat'?'normal':'repeat'; repeatBtn.classList.toggle('active',playMode==='repeat'); shuffleBtn.classList.remove('active'); showMsg(playMode==='repeat'?'🔁 单曲循环':'➡️ 顺序播放'); });
    shuffleBtn.addEventListener('click', () => { if(playMode!=='shuffle'){ playMode='shuffle'; reshuffle(); shuffleBtn.classList.add('active'); repeatBtn.classList.remove('active'); showMsg('🎲 随机播放'); } else { playMode='normal'; shuffleBtn.classList.remove('active'); showMsg('➡️ 顺序播放'); } });
    document.getElementById('speedBtn').addEventListener('click', () => { let r=[0.75,1.0,1.25,1.5]; let i=r.indexOf(playbackRateVal); playbackRateVal=r[(i+1)%r.length]; audio.playbackRate=playbackRateVal; speedValSpan.innerText=playbackRateVal.toFixed(2)+'x'; });
    
    audio.volume = 0.7;
    volumeRange.value = 0.7;
    loadSongs();
</script>
</body>
</html>
