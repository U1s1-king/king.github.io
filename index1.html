<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>首页</title>
    <!-- 樱花主题字体 & 图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff9f7 0%, #ffeef4 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #2e2a2b;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* 樱花飘落容器 (与博客主页一致) */
        .sakura-flurry {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            background: radial-gradient(circle, #ffdfe6, #ffb7c5);
            width: 12px;
            height: 12px;
            border-radius: 80% 0 55% 40% / 60% 45% 55% 40%;
            opacity: 0.7;
            filter: blur(0.3px);
            transform: rotate(15deg);
            box-shadow: 0 1px 2px rgba(255, 140, 170, 0.2);
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 0.5;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 主容器 — 个人介绍更偏重留白与卡片细节 */
        .about-container {
            max-width: 880px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            position: relative;
            z-index: 20;
        }

        /* 页眉 & 导航栏 (适配博客跳转) */
        .about-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .blog-title {
            font-size: 2.8rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #e6728f, #b34262);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .blog-title i {
            background: none;
            color: #ec8ca8;
            font-size: 2.2rem;
        }

        .subhead {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #b45f6e;
            background: #fff0f3aa;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #b34e6b;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            font-size: 1rem;
        }

        .nav-links a:hover {
            border-bottom-color: #f6a5c0;
            color: #9e3c58;
        }

        /* 个人介绍主卡片 */
        .profile-card {
            background: rgba(255, 250, 252, 0.88);
            backdrop-filter: blur(3px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.5rem;
            margin: 1.2rem 0 2rem;
            box-shadow: 0 18px 32px -12px rgba(216, 112, 140, 0.2);
            border: 1px solid #ffe2ec;
            transition: all 0.2s;
        }

        /* 头像区域 (樱花环+大图限制) */
        .avatar-section {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        .sakura-avatar-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd9e4, #ffb7cb);
            padding: 5px;
            box-shadow: 0 15px 25px rgba(231, 103, 136, 0.25);
            transition: 0.25s ease;
        }

        .sakura-avatar-frame:hover {
            transform: scale(1.02) rotate(2deg);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid white;
            background: #ffeef2;
        }

        /* 姓名 + 简短标语 */
        .intro-name {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 600;
            font-family: 'Noto Serif SC', serif;
            color: #4f2f39;
            margin-bottom: 0.5rem;
        }

        .intro-tagline {
            text-align: center;
            color: #da889f;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1rem;
            margin-bottom: 1.6rem;
            border-bottom: 1px dashed #ffcdda;
            display: inline-block;
            width: auto;
            padding-bottom: 0.4rem;
        }

        /* 关于文字段落 (占位符与真实内容混合) */
        .bio-text {
            font-size: 1rem;
            line-height: 1.7;
            color: #3a2c2f;
            margin: 1.5rem 0;
        }

        /* 保留樱花占位符风格 (用于后续填空) */
        .placeholder-marker {
            background: #fff0f0;
            border-left: 4px solid #ff98b9;
            padding: 0.9rem 1.2rem;
            border-radius: 20px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #c25070;
            font-size: 0.9rem;
            margin: 1rem 0;
            white-space: pre-wrap;
        }

        .cherry-placeholder {
            background: #fbebef;
            border-radius: 18px;
            padding: 0.8rem 1rem;
            color: #be6b84;
            font-family: monospace;
            border: 1px dashed #ffb3c6;
            margin: 0.8rem 0;
        }

        /* 信息网格: 喜好/个人档案 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .info-item {
            background: #fff6f9;
            border-radius: 1.8rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid #ffe1ea;
            transition: all 0.2s;
        }

        .info-item i {
            font-size: 1.6rem;
            color: #e982a2;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .info-label {
            font-weight: 600;
            color: #ac5d76;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .info-desc {
            font-size: 0.9rem;
            margin-top: 0.3rem;
            color: #4c353c;
        }

        /* 社交媒体/链接区 */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }

        .social-links a {
            background: #fff1f4;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #dc7c99;
            font-size: 1.4rem;
            transition: 0.2s;
            text-decoration: none;
            border: 1px solid #ffd2df;
        }

        .social-links a:hover {
            background: #ffe2ea;
            color: #b84f6e;
            transform: translateY(-3px);
        }

        /* 回到博客专用按钮 */
        .back-to-blog {
            text-align: center;
            margin-top: 2rem;
        }

        .btn-cherry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffe9ef;
            padding: 0.7rem 1.6rem;
            border-radius: 50px;
            color: #b95272;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid #ffc2d4;
            transition: all 0.2s;
        }

        .btn-cherry:hover {
            background: #ffdfe8;
            color: #9c405e;
            box-shadow: 0 5px 12px rgba(231, 118, 142, 0.25);
            transform: translateY(-2px);
        }

        hr.sakura-divider {
            margin: 2rem 0;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f7bfd2, #ff90b5, #f7bfd2, transparent);
        }

        .blog-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #ffd5e2;
            font-size: 0.8rem;
            color: #b1798a;
        }

        @media (max-width: 650px) {
            .about-container {
                padding: 1rem 1.2rem 2.5rem;
            }
            .blog-title {
                font-size: 2rem;
            }
            .intro-name {
                font-size: 1.8rem;
            }
            .sakura-avatar-frame {
                width: 120px;
                height: 120px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 引入图片限制防溢出 */
        .about-container img {
            max-width: 100%;
            height: auto;
        }

    </style>
</head>

<script>
    (function(){
        // 樱花飘落逻辑 (与主页相同保持氛围一致)
        const flurryContainer = document.getElementById('sakura-flurry');
        if (!flurryContainer) return;
        let petalCount = 45;
        if (window.innerWidth < 700) petalCount = 28;
        
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            const size = 8 + Math.random() * 14;
            petal.style.width = size + 'px';
            petal.style.height = size * 0.9 + 'px';
            petal.style.left = Math.random() * 100 + '%';
            const duration = 6 + Math.random() * 12;
            petal.style.animationDuration = duration + 's';
            petal.style.animationDelay = Math.random() * 15 + 's';
            petal.style.opacity = 0.4 + Math.random() * 0.5;
            petal.style.background = `radial-gradient(circle, #ffdfe6, #ffb0c2)`;
            petal.style.filter = `blur(${Math.random() * 1.2}px)`;
            return petal;
        }
        
        for (let i = 0; i < petalCount; i++) {
            flurryContainer.appendChild(createPetal());
        }
        
        function replenishPetals() {
            const currentCount = flurryContainer.children.length;
            if (currentCount < petalCount - 8) {
                const need = petalCount - currentCount;
                for (let i = 0; i < Math.min(need, 8); i++) {
                    flurryContainer.appendChild(createPetal());
                }
            }
            const allPetals = flurryContainer.querySelectorAll('.petal');
            for (let p of allPetals) {
                const rect = p.getBoundingClientRect();
                if (rect.top > window.innerHeight + 100 || rect.bottom < -100) {
                    p.remove();
                }
            }
        }
        setInterval(replenishPetals, 4000);
        
        window.addEventListener('resize', function() {
            let expected = window.innerWidth < 700 ? 28 : 45;
            if (Math.abs(flurryContainer.children.length - expected) > 12) {
                while(flurryContainer.firstChild) {
                    flurryContainer.removeChild(flurryContainer.firstChild);
                }
                petalCount = expected;
                for (let i=0; i<petalCount; i++) {
                    flurryContainer.appendChild(createPetal());
                }
            }
        });
        
        setTimeout(() => {
            if(flurryContainer.children.length < 20) {
                for(let i=0;i<12;i++) flurryContainer.appendChild(createPetal());
            }
        }, 500);
    })();

    // 轻柔提示占位符可编辑，保持与博客一致的辅助体验
    const placeholders = document.querySelectorAll('.placeholder-marker, .cherry-placeholder');
    placeholders.forEach(elem => {
        elem.setAttribute('data-placeholder-hint', '樱花占位符区域，请替换为个人内容');
        elem.style.transition = 'all 0.2s';
        elem.addEventListener('mouseenter', () => {
            elem.style.opacity = '0.95';
            elem.style.boxShadow = '0 0 0 2px #ffb7c980';
        });
        elem.addEventListener('mouseleave', () => {
            elem.style.opacity = '';
            elem.style.boxShadow = '';
        });
    });
    console.log('🌸 个人介绍页已加载 | 与博客主页共享樱花氛围。所有带 # 标记的地方自由填写，让世界认识你～');
</script>
